<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#050b14">
  <title>Warrant Tracker | ค้นหาหมายจับ</title>
  
  <!-- Modern Fonts and Icons -->
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary-color: #2563eb;
      --bg-dark: #050b14;
      --card-bg: #0f172a;
      --surface-bg: #111827;
      --border-color: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-dark: #64748b;
      --radius-lg: 18px;
      --radius-md: 14px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'IBM Plex Sans Thai', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #050a12 100%);
      min-height: 100vh;
      padding: 24px 16px;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUpFade {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .system-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
      position: relative;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .system-title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #ffffff;
      text-transform: uppercase;
    }

    .system-subtitle {
      margin-top: 6px;
      color: var(--text-dark);
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* Profile Section - User Bar */
    .user-bar {
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 0 16px;
      margin-bottom: 24px;
    }

    .profile-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
      overflow: hidden;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .user-bar span {
      color: var(--text-main);
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }

    .online-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .online-text {
      font-size: 11px;
      font-weight: 700;
      color: #10b981;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .online-dot {
      width: 8px;
      height: 8px;
      background-color: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 8px #10b981;
      animation: pulseGreen 2s infinite;
    }

    @keyframes pulseGreen {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    /* Segmented Control (Toggle) */
    .search-type-toggle {
      display: flex;
      background: var(--surface-bg);
      padding: 4px;
      border-radius: 12px;
      margin-bottom: 24px;
      border: 1px solid var(--border-color);
    }

    .toggle-btn {
      flex: 1;
      padding: 12px 8px;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .toggle-btn.active {
      background: var(--primary-color);
      color: #ffffff;
    }

    /* Inputs */
    .input-group {
      margin-bottom: 24px;
    }

    .input-group input {
      width: 100%;
      height: 60px;
      padding: 0 20px;
      font-size: 18px;
      border: 1px solid #334155;
      border-radius: var(--radius-md);
      background: #0b1220;
      color: #ffffff;
      transition: var(--transition);
      font-family: inherit;
    }

    .input-group input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .input-group input::placeholder {
      color: #475569;
    }

    /* Buttons */
    .button-group {
      margin-bottom: 24px;
    }

    .search-btn {
      width: 100%;
      height: 56px;
      background: var(--primary-color);
      color: #ffffff;
      font-weight: 700;
      border: none;
      border-radius: var(--radius-md);
      font-size: 16px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: 0.5px;
    }

    .search-btn:hover {
      background: #1d4ed8;
    }

    .search-btn:active {
      transform: scale(0.99);
    }

    /* Results */
    .result-section {
      min-height: 0px;
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-title i {
      color: var(--primary-color);
    }

    /* Table Intelligence UI */
    .table-container {
      border-radius: 12px;
      border: 1px solid var(--border-color);
      overflow: hidden;
      background: var(--card-bg);
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .result-table th {
      padding: 14px 16px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      background: var(--surface-bg);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border-color);
    }

    .result-table td {
      padding: 16px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      border-bottom: 1px solid var(--border-color);
    }

    .result-table tbody tr {
      transition: background 0.15s;
    }

    .result-table tbody tr:hover {
      background-color: var(--surface-bg);
    }

    .result-table tbody tr:last-child td {
      border-bottom: none;
    }

    /* Custom Military Status Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .badge.danger {
      background: #450a0a;
      color: #fca5a5;
      border: 1px solid #7f1d1d;
    }

    .badge.success {
      background: #052e16;
      color: #86efac;
      border: 1px solid #064e3b;
    }

    .badge.warning {
      background: #422006;
      color: #fde68a;
      border: 1px solid #854d0e;
    }

    .badge.neutral {
      background: var(--surface-bg);
      color: var(--text-muted);
      border: 1px solid var(--border-color);
    }

    /* Terminal Status Boxes */
    .info-box, .error-box, .success-box {
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      line-height: 1.5;
    }

    .info-box {
      background: var(--surface-bg);
      color: var(--text-muted);
      border: 1px solid var(--border-color);
    }

    .error-box {
      background: #1c1917;
      color: #f87171;
      border: 1px solid #7f1d1d;
    }

    .success-box {
      background: #064e3b;
      color: #a7f3d0;
      border: 1px solid #047857;
    }

    /* Intel Loading Screen */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 11, 20, 0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
    }
    
    .loading-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .loading-content {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 40px;
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    .loading-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #ffffff;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .loading-subtitle {
      color: var(--text-dark);
      font-size: 13px;
      margin-bottom: 24px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .loading-bar-container {
      width: 100%;
      height: 4px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
    }

    .loading-bar {
      width: 50%;
      height: 100%;
      background: var(--primary-color);
      border-radius: 999px;
      animation: loadingSweep 1.5s infinite ease-in-out;
    }

    @keyframes loadingSweep {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(100%); }
      100% { transform: translateX(200%); }
    }

    /* Mobile Responsive */
    @media (max-width: 600px) {
      .system-card { padding: 24px; }
      .system-title { font-size: 26px; }
      .user-bar { flex-direction: row; text-align: left; }
      .input-group input { height: 54px; font-size: 16px; }
      .search-btn { height: 50px; font-size: 15px; }
      .result-table th, .result-table td { padding: 12px 10px; font-size: 13px; }
    }

    .hidden { display: none !important; }

    /* Tactical Debug Card */
    .debug-card {
      background: #111827;
      border-radius: 12px;
      padding: 24px;
      border: 1px solid #ef4444;
    }
  </style>
</head>
<body>

<!-- High-Tech Intelligence Loading State -->
<div id="loadingOverlay" class="loading-overlay active">
  <div class="loading-content">
    <div class="loading-title">WARRANT TRACKER</div>
    <div class="loading-subtitle" id="loadingText">SYNCHRONIZING DATABASE</div>
    <div class="loading-bar-container">
      <div class="loading-bar"></div>
    </div>
  </div>
</div>

<div class="container">
  <div class="system-card">
    <div class="header">
      <div class="system-title">WARRANT TRACKER SYSTEM</div>
      <div class="system-subtitle">ระบบสืบค้นหมายจับ</div>
    </div>

    <!-- Minimalist User Bar -->
    <div id="profileSection" class="user-bar hidden">
      <div class="profile-avatar" id="profileAvatar">
        <i class="fas fa-user"></i>
      </div>
      <span id="userName">-</span>
      <div class="online-indicator">
        <span class="online-text">Connected</span>
        <div class="online-dot"></div>
      </div>
    </div>

    <!-- Toggle Controls -->
    <div class="search-type-toggle">
      <button class="toggle-btn active" data-type="id13">
        <i class="fas fa-id-card"></i> เลขบัตรประชาชน
      </button>
      <button class="toggle-btn" data-type="name">
        <i class="fas fa-users"></i> ชื่อ - นามสกุล
      </button>
    </div>

    <!-- Main Dynamic Input (Removed label as requested) -->
    <div class="input-group">
      <input type="number" id="searchInput" placeholder="กรอกเลขบัตรประชาชน 13 หลัก" autocomplete="off">
    </div>

    <!-- One Master Tactical Button -->
    <div class="button-group">
      <button class="search-btn" id="searchBtn">
        <i class="fas fa-search"></i> ค้นหาหมายจับ
      </button>
    </div>

    <!-- Result Console (Initially Empty as requested) -->
    <div class="result-section" id="resultArea"></div>
  </div>
</div>

<span id="userIdDisplay" class="hidden"></span>

<script src="https://static.line-scdn.net/liff/edge/versions/2.23.0/sdk.js"></script>
<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyss_zHh0OcITnBgf86OQCL_TMBbWLuyYkQpI2gyQIzXPYOlW0VLOo5O1i2gs2RC13a/exec";  
  const LIFF_ID = "2010272973-QI3DZhXq";          

  let lineProfile = { userId: '', displayName: '', pictureUrl: '' };
  let currentSearchType = "id13";
  let isAuthorized = false;

  function showLoading(show, customText = null) {
    const overlay = document.getElementById("loadingOverlay");
    const textElem = document.getElementById("loadingText");
    
    if (show) {
      if (customText) textElem.innerText = customText.toUpperCase();
      overlay.classList.add("active");
    } else {
      overlay.classList.remove("active");
      setTimeout(() => { textElem.innerText = "SYNCHRONIZING DATABASE"; }, 300);
    }
  }

  function showResult(type, message, data = null) {
    const resultDiv = document.getElementById("resultArea");
    
    // Clear & restart animations
    resultDiv.style.animation = 'none';
    resultDiv.offsetHeight; 
    resultDiv.style.animation = null; 

    if (type === "info") {
      resultDiv.innerHTML = `<div class="info-box"><i class="fas fa-info-circle"></i> ${message}</div>`;
    } else if (type === "error") {
      resultDiv.innerHTML = `<div class="error-box"><i class="fas fa-exclamation-triangle"></i> ${message}</div>`;
    } else if (type === "success") {
      resultDiv.innerHTML = `<div class="success-box"><i class="fas fa-check-circle"></i> ${message}</div>`;
    } else if (type === "table" && data) {
      if (data.length === 0) {
        resultDiv.innerHTML = `<div class="info-box"><i class="fas fa-search"></i> ไม่พบข้อมูลในระบบ</div>`;
        return;
      }
      
      let html = `
        <div class="result-title">
          <i class="fas fa-database"></i> พบข้อมูล ${data.length} รายการ
        </div>
        <div class="table-container">
          <table class="result-table">
            <thead>
              <tr><th>หมายจับ</th><th>ชื่อ-สกุล</th><th>สถานะ</th></tr>
            </thead>
            <tbody>
      `;
      
      for (let row of data) {
        let badgeClass = "neutral";
        if (row.status) {
          if (row.status.includes('ต้องการตัว')) {
            badgeClass = "success";
          } else if (row.status.includes('สิ้นผลรอเพิกถอน')) {
            badgeClass = "warning";
          } else if (row.status.includes('เพิกถอน')) {
            badgeClass = "danger";
          }
        }

        html += `
          <tr>
            <td style="font-weight: 700; color: var(--text-main); font-family: monospace;">${escapeHtml(row.warrantNo || '-')}</td>
            <td>${escapeHtml(row.fullName || '-')}</td>
            <td>
              <span class="badge ${badgeClass}">${escapeHtml(row.status || '-')}</span>
            </td>
          </tr>
        `;
      }
      
      html += `</tbody></table></div>`;
      resultDiv.innerHTML = html;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function showDebugUserId(message, userIdValue = null) {
    const userIdToShow = userIdValue || lineProfile.userId || "ไม่สามารถดึง User ID ได้";
    const resultDiv = document.getElementById("resultArea");
    
    let debugHtml = `
      <div class="debug-card">
        <div style="color: #ef4444; font-weight: 700; margin-bottom: 16px; display: flex; gap: 8px; align-items: center; font-size: 15px;">
          <i class="fas fa-shield-alt"></i> ${message}
        </div>
        <div style="background: #020617; color: #f8fafc; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 13px; word-break: break-all; margin-bottom: 16px; border: 1px solid var(--border-color);">
          <strong style="color: #fca5a5;">🆔 User ID:</strong><br>
          <span id="debugUserIdText" style="display: block; margin-top: 6px; color: #93c5fd;">${userIdToShow}</span>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <button onclick="copyDebugUserId()" class="search-btn" style="flex: 1; height: 46px; font-size: 13px; background: #334155;">
            <i class="fas fa-copy"></i> คัดลอก ID
          </button>
          <button onclick="location.reload()" class="search-btn" style="flex: 1; height: 46px; font-size: 13px; background: #1e293b;">
            <i class="fas fa-sync-alt"></i> ลองใหม่
          </button>
        </div>
        <div style="margin-top: 16px; font-size: 12px; color: var(--text-muted); text-align: center;">
          <i class="fas fa-info-circle"></i> โปรดแจ้งชุดข้อมูลนี้แก่แอดมิน เพื่อลงทะเบียนเข้าใช้ฐานระบบ
        </div>
      </div>
    `;
    resultDiv.innerHTML = debugHtml;
    window.copyDebugUserId = function() {
      const text = document.getElementById("debugUserIdText").innerText;
      navigator.clipboard.writeText(text).then(() => {
        alert("✅ คัดลอกระบบเรียบร้อย");
      }).catch(() => {
        const tempInput = document.createElement("input");
        tempInput.value = text;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);
        alert("✅ คัดลอกระบบเรียบร้อย");
      });
    };
  }

  async function callGas(action, payload = {}) {
    if (!GAS_URL || !GAS_URL.startsWith("https://script.google.com/macros/s/") || !GAS_URL.endsWith("/exec")) {
      showDebugUserId("ความล้มเหลวของการตั้งค่า (GAS_URL)", "กรุณาติดต่อชุดสืบสวนควบคุม");
      throw new Error("GAS_URL not configured");
    }
    if (!lineProfile.userId) {
      showDebugUserId("ระบบตรวจสอบยืนยันตัวตน LINE ล้มเหลว", "เปิดใน LINE แอพพิลเคชันเท่านั้น");
      throw new Error("Not logged in");
    }
    try {
      const response = await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({
          action: action,
          userId: lineProfile.userId,
          displayName: lineProfile.displayName,
          page: "search.html",
          ...payload
        })
      });
      return await response.json();
    } catch(err) {
      console.error("callGas error:", err);
      showResult("error", "การเชื่อมต่อเครือข่ายล้มเหลว กรุณาดำเนินการตรวจค้นใหม่อีกครั้ง");
      throw err;
    }
  }

  async function performSearch() {
    const searchInput = document.getElementById("searchInput");
    let keyword = searchInput.value.trim();
    
    if (!keyword) {
      showResult("error", "ระบุข้อมูลสืบค้นก่อนดำเนินการ");
      searchInput.focus();
      return;
    }
    
    if (currentSearchType === "id13") {
      if (!/^\d{13}$/.test(keyword)) {
        showResult("error", "ข้อบังคับ: เลขประจำตัวประชาชนต้องครบ 13 หลัก");
        return;
      }
    } else if (currentSearchType === "name") {
      if (keyword.length < 2) {
        showResult("error", "ข้อบังคับ: ต้องระบุชื่ออย่างน้อย 2 ตัวอักษร");
        return;
      }
    }
    
    showLoading(true, "Querying Database Central...");
    try {
      const result = await callGas("search", {
        searchType: currentSearchType,
        keyword: keyword
      });
      
      if (result && result.success === false) {
        showResult("error", result.error || result.message || "เกิดความผิดพลาดในการเข้าถึงสารบบ");
      } else {
        showResult("table", "", result.data || []);
      }
    } catch(err) {
      console.error(err);
    } finally {
      showLoading(false);
    }
  }

  function initLiff() {
    return new Promise((resolve, reject) => {
      liff.init({ liffId: LIFF_ID }, () => {
        if (liff.isLoggedIn()) {
          liff.getProfile().then(profile => {
            lineProfile.userId = profile.userId;
            lineProfile.displayName = profile.displayName;
            lineProfile.pictureUrl = profile.pictureUrl || "";
            
            document.getElementById("userName").innerText = profile.displayName;
            
            const hiddenUserIdSpan = document.getElementById("userIdDisplay");
            if(hiddenUserIdSpan) hiddenUserIdSpan.innerText = profile.userId;
            
            const avatarDiv = document.getElementById("profileAvatar");
            if (profile.pictureUrl) {
              avatarDiv.innerHTML = `<img src="${profile.pictureUrl}" alt="Profile">`;
            } else {
              avatarDiv.innerHTML = `<i class="fas fa-user"></i>`;
            }
            document.getElementById("profileSection").classList.remove("hidden");
            resolve(true);
          }).catch(err => {
            console.error("getProfile error:", err);
            reject(err);
          });
        } else {
          liff.login();
          reject(new Error("Need login"));
        }
      }, err => {
        console.error("liff.init error:", err);
        reject(err);
      });
    });
  }

  // Event Listeners
  document.getElementById("searchBtn").addEventListener("click", performSearch);
  
  document.getElementById("searchInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") performSearch();
  });
  
  document.querySelectorAll(".toggle-btn").forEach(btn => {
    btn.addEventListener("click", function() {
      document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
      this.classList.add("active");
      
      currentSearchType = this.getAttribute("data-type");
      const input = document.getElementById("searchInput");
      
      if (currentSearchType === "id13") {
        input.type = "number";
        input.inputMode = "numeric";
        input.placeholder = "กรอกเลขบัตรประชาชน 13 หลัก";
      } else {
        input.type = "text";
        input.inputMode = "text";
        input.placeholder = "กรอกชื่อ-สกุล (เช่น สมชาย จริงใจ)";
      }
      
      input.value = ""; // Auto clean form when mode switches
      input.focus();
    });
  });

  // Init Application
  window.addEventListener("DOMContentLoaded", async () => {
    try {
      await initLiff();
      // Removed default showResult info-box call so the bottom area remains clean and empty initially
    } catch (err) {
      console.error("Init error:", err);
      showDebugUserId("การเชื่อมต่อฐานข้อมูลความมั่นคงจำกัดสิทธิ์", "กรุณาลงทะเบียนผ่านเบราว์เซอร์ผู้พิทักษ์สันติราษฎร์");
    } finally {
      setTimeout(() => showLoading(false), 800);
    }
  });
</script>
</body>
</html>
